on-unmatched = "info"

[global]
excludes = [".claude/**", "dist/**"]

[formatter.prettier]
command = "prettier"
options = ["--write"]
includes = ["*.md", "*.astro", "*.ts", "*.mjs", "*.json", "*.yaml", "*.yml"]
excludes = ["pnpm-lock.yaml"]

[formatter.nixfmt]
command = "nixfmt"
includes = ["*.nix"]

[formatter.taplo]
command = "taplo"
options = ["format"]
includes = ["*.toml"]
